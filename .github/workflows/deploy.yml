name: Build & Deploy WarOfTanks

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Unity WebGL build
        run: |
          mkdir -p FRONTEND/public/UnityBuild
          curl -fL -o webgl-build.tar.gz \
            "https://github.com/${{ github.repository }}/releases/latest/download/waroftanks-webgl-build.tar.gz"
          tar -xzf webgl-build.tar.gz -C FRONTEND/public/UnityBuild
          rm webgl-build.tar.gz

      - name: Setup WireGuard
        run: |
          sudo apt install -y wireguard
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
          sudo sed -i '/^DNS/d' /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

      - name: Get secrets from Vault
        run: |
          VAULT_ADDR=http://10.0.0.1:8200
          VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}
          CICD=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" $VAULT_ADDR/v1/secret/data/cicd | jq -r '.data.data')
          echo "DOCKERHUB_USERNAME=$(echo $CICD | jq -r '.DOCKERHUB_USERNAME')" >> $GITHUB_ENV
          echo "DOCKERHUB_TOKEN=$(echo $CICD | jq -r '.DOCKERHUB_TOKEN')" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./BACKEND
          push: true
          tags: oroitzlr/waroftanks-backend:latest

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./FRONTEND
          push: true
          tags: oroitzlr/waroftanks-frontend:latest
          build-args: |
            VITE_API_URL=https://wot-api.oroitzlagoramos.com

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Setup WireGuard
        run: |
          sudo apt install -y wireguard
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
          sudo sed -i '/^DNS/d' /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

      - name: Get VPS access from Vault
        run: |
          VAULT_ADDR=http://10.0.0.1:8200
          VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}
          CICD=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" $VAULT_ADDR/v1/secret/data/cicd | jq -r '.data.data')

          echo "VPS_HOST=$(echo $CICD | jq -r '.VPS_HOST')" >> $GITHUB_ENV
          echo "VPS_USER=$(echo $CICD | jq -r '.VPS_USER')" >> $GITHUB_ENV
          echo "VPS_PORT=$(echo $CICD | jq -r '.VPS_PORT')" >> $GITHUB_ENV

          EOF_MARKER=$(openssl rand -hex 8)
          echo "VPS_SSH_KEY<<$EOF_MARKER" >> $GITHUB_ENV
          echo $CICD | jq -r '.VPS_SSH_KEY' >> $GITHUB_ENV
          echo "$EOF_MARKER" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ env.VPS_PORT }} ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: SSH → deploy
        run: |
          ssh -p ${{ env.VPS_PORT }} -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'SSHEOF'
            WOT=$(curl -s -H "X-Vault-Token: $(cat ~/.vault-token)" http://10.0.0.1:8200/v1/secret/data/waroftanks | jq -r '.data.data')

            JWT_SECRET=$(echo $WOT | jq -r '.JWT_SECRET')
            JWT_REFRESH_SECRET=$(echo $WOT | jq -r '.JWT_REFRESH_SECRET')

            printf "JWT_SECRET=%s\nJWT_REFRESH_SECRET=%s\n" \
              "$JWT_SECRET" "$JWT_REFRESH_SECRET" > ~/vps-infra-repo/waroftanks/.env

            cd ~/vps-infra-repo/waroftanks
            docker compose pull
            docker compose up -d --force-recreate

            echo "Deploy OK"
          SSHEOF